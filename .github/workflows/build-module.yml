name: Build KernelSU module

on:
  workflow_dispatch:
    inputs:
      target_device:
        description: "Select target device (must exist in btf/ folder)"
        required: true
        type: choice
        options:
          - all
          - mi_13u
          - redmi_k90pm
          - oneplus_15
        default: "all"
      create_release:
        description: "Create a GitHub Release after building"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag to create when create_release is true"
        required: false
        type: string
        default: "v2.0.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt update
          sudo apt install -y curl unzip make git clang llvm lld tar xxd zip pkg-config autoconf automake libtool bzip2 xz-utils

      - name: Install bpftool
        run: |
          BPFTOOL_VERSION="v7.7.0"
          curl -fL --retry 3 \
            "https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-amd64.tar.gz" \
            -o "$RUNNER_TEMP/bpftool.tar.gz"
          mkdir -p "$RUNNER_TEMP/bpftool"
          tar -xzf "$RUNNER_TEMP/bpftool.tar.gz" -C "$RUNNER_TEMP/bpftool"
          BPFTOOL_PATH="$(find "$RUNNER_TEMP/bpftool" -type f -name bpftool | head -n 1)"
          chmod +x "$BPFTOOL_PATH"
          echo "BPFTOOL=$BPFTOOL_PATH" >> "$GITHUB_ENV"

      - name: Cache Android arm64 dependencies
        uses: actions/cache@v4
        with:
          path: ~/hideport-deps
          key: hideport-deps-r25c-${{ runner.os }}-${{ hashFiles('build_deps_android.sh') }}

      - name: Build module from BTF
        run: |
          # 获取输入参数，如果是 push tag 触发则默认跑 all
          TARGET="${{ github.event.inputs.target_device || 'all' }}"
          echo "Building for target: $TARGET"
          bash tools/build_from_btf.sh "$TARGET"

      - name: Stage module zips
        run: |
          # 将所有生成的设备特定 zip 移动到当前目录以便上传
          # 假设脚本中使用了 mv ... hideSceneport_module_${device_name}.zip
          mkdir -p ./output
          cp ../hideSceneport_module*.zip ./output/
          ls -lh ./output/

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ScenePortHider_Builds
          path: ./output/hideSceneport_module*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Scene Port Hider by eBPF ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          body: |
            KernelSU modules built by GitHub Actions.
            This package is tied to the target kernel BTF committed in this repository.
            For other devices or kernels, fork the repository and rebuild with that device's BTF.
            
            Target: ${{ github.event.inputs.target_device || 'All tags' }}
            
            Included files are compiled against specific kernel BTF structures provided in the repository.
          # 使用通配符，Action 会自动将目录下所有符合条件的 zip 分别作为附件上传到同一个 Release
          files: ./output/hideSceneport_module*.zip